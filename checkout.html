<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | SRAV Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ecommerce.css">
    <link rel="stylesheet" href="css/subpage.css">
    <style>
        .checkout-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; padding: 60px 0; }
        .checkout-form-card { background: var(--white); padding: 40px; border-radius: var(--radius-xl); border: 1px solid var(--border); }
        .checkout-summary-card { background: var(--off-white); padding: 40px; border-radius: var(--radius-xl); border: 1px solid var(--border); height: fit-content; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--heading); }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.95rem; }
        .summary-total { border-top: 2px solid var(--border); margin-top: 20px; padding-top: 20px; font-weight: 800; font-size: 1.2rem; display: flex; justify-content: space-between; }
        @media (max-width: 991px) { .checkout-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.jpeg" alt="SRAV" class="nav-logo-img">
                <span class="nav-brand"><span style="color:var(--heading)">SRAV</span>Products</span>
            </a>
            <a href="products.html" class="btn-link"><i class="fas fa-arrow-left"></i> Back to Shop</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <div class="checkout-container">
            <div class="checkout-form-card">
                <h2 style="margin-bottom: 30px;">Shipping Details</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+91 00000 00000" required>
                    </div>
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <textarea rows="4" placeholder="House No, Street, City, Pincode" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; height: 55px; font-size: 1.1rem;">Place Order (Demo Only)</button>
                </form>
            </div>

            <div class="checkout-summary-card">
                <h3 style="margin-bottom: 25px;">Order Summary</h3>
                <div id="checkout-items">
                    <!-- Dynamic -->
                </div>
                <div class="summary-total">
                    <span>Total Amount</span>
                    <span id="checkout-total">₹0</span>
                </div>
                <p style="font-size: 0.8rem; color: var(--muted); margin-top: 20px; text-align: center;">This is a demonstration. No real payment will be processed.</p>
            </div>
        </div>
    </div>

    <script src="js/products-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cart = JSON.parse(localStorage.getItem('srav_cart')) || [];
            const summaryContainer = document.getElementById('checkout-items');
            const totalElement = document.getElementById('checkout-total');
            
            if (cart.length === 0) {
                window.location.href = 'products.html';
                return;
            }

            let total = 0;
            summaryContainer.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="summary-item">
                        <span>${item.name} x ${item.quantity}</span>
                        <span>₹${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `;
            }).join('');
            
            totalElement.innerText = `₹${total.toLocaleString()}`;

            document.getElementById('checkout-form').addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Success! Your demo order has been placed. Our team will contact you for confirmation.');
                localStorage.removeItem('srav_cart');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
